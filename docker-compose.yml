version: "3.9"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: giftgraph
      POSTGRES_USER: giftgraph_user
      POSTGRES_PASSWORD: giftgraph_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U giftgraph_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
